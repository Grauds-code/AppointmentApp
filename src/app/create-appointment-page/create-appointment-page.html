<app-navigation></app-navigation>

<div class="container">
  <h2 class="mb-4">Create Appointment</h2>

  @for (appt of formCreator.appointments; track $index; let i = $index) {
    @if (!appt().value().id) {
      <div class="card shadow-sm" style="max-width: 600px">
        <div class="card-body">
          <form>
            <div class="mb-3">
              <label class="form-label">Appointment Name</label>
              <input type="text" class="form-control" [formField]="appt.AppointmentName" />
              <app-error-valdiations [state]="appt.AppointmentName()"></app-error-valdiations>
            </div>

            <div class="mb-3">
              <label class="form-label">Date</label>
              <input type="date" class="form-control" [formField]="appt.AppointmentDate" />
              <app-error-valdiations [state]="appt.AppointmentDate()"></app-error-valdiations>
            </div>

            <div class="mb-3">
              <label class="form-label">Time</label>
              <input type="time" class="form-control" [formField]="appt.AppointmentTime" />
              <app-error-valdiations [state]="appt.AppointmentTime()"></app-error-valdiations>
            </div>

            <div class="mb-3">
              <label class="form-label">Location</label>
              <input type="text" class="form-control" [formField]="appt.AppointmentLocation" />
              <app-error-valdiations [state]="appt.AppointmentLocation()"></app-error-valdiations>
            </div>

            <div class="mb-3">
              <label class="form-label">Max Number of People</label>
              <input type="number" class="form-control" [formField]="appt.MaxNumberofPeople" />
              <app-error-valdiations [state]="appt.MaxNumberofPeople()"></app-error-valdiations>
            </div>

            <div class="mb-3">
              <label class="form-label">Description</label>
              <textarea class="form-control" rows="3" [formField]="appt.Description"></textarea>
              <app-error-valdiations [state]="appt.Description()"></app-error-valdiations>
            </div>

            <button type="button" class="btn btn-primary w-100" (click)="createAppointment(i)">
              Create Appointment
            </button>
          </form>
        </div>
      </div>
    }
  }
</div>
